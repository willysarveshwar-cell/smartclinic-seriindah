<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f766e">
  <title>Manage Patients | Smart Clinic</title>
  <link rel="stylesheet" href="dist/app.css">
  <style>
    .filter-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
    .filter-row input, .filter-row select { padding:8px; border:1px solid #ccc; border-radius:6px; font-size:14px; }
    .patient-table { width:100%; border-collapse:collapse; }
    .patient-table th, .patient-table td { padding:10px 12px; border:1px solid #e0e0e0; font-size:14px; text-align:left; }
    .patient-table th { background:#f5f7fa; font-weight:600; }
    .patient-table tr:hover { background:#f9fafb; }
    .badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:12px; }
    .badge-male   { background:#dbeafe; color:#1d4ed8; }
    .badge-female { background:#fce7f3; color:#9d174d; }
    .badge-other  { background:#f3f4f6; color:#374151; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; overflow-y:auto; }
    .modal-overlay.open { display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; }
    .modal-box { background:#fff; border-radius:10px; width:100%; max-width:700px; padding:28px; }
    .modal-box h3 { margin:0 0 18px; font-size:18px; }
    .modal-box label { display:block; font-size:13px; font-weight:600; margin:10px 0 3px; }
    .modal-box input, .modal-box select { width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:6px; font-size:14px; box-sizing:border-box; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
    .btn-danger  { background:#dc2626; color:#fff; border:none; padding:8px 18px; border-radius:6px; cursor:pointer; font-size:14px; }
    .btn-danger:hover { background:#b91c1c; }
    .history-section h4 { margin:18px 0 8px; font-size:15px; border-bottom:1px solid #e5e7eb; padding-bottom:4px; }
    .history-table { width:100%; border-collapse:collapse; font-size:13px; }
    .history-table th, .history-table td { padding:7px 10px; border:1px solid #e5e7eb; }
    .history-table th { background:#f5f7fa; }
    .status-badge { padding:2px 8px; border-radius:10px; font-size:12px; font-weight:600; }
    .status-Waiting     { background:#fef9c3; color:#854d0e; }
    .status-Completed   { background:#dcfce7; color:#166534; }
    .status-In.Progress { background:#dbeafe; color:#1e40af; }
    .status-Cancelled   { background:#fee2e2; color:#991b1b; }
    .pagination { display:flex; gap:8px; align-items:center; margin-top:14px; }
    .pagination button { padding:6px 14px; border:1px solid #d1d5db; border-radius:6px; background:#fff; cursor:pointer; font-size:13px; }
    .pagination button:disabled { opacity:.4; cursor:default; }
    .pagination span { font-size:13px; color:#6b7280; }
  </style>
</head>
<body>

<div class="navbar">
  <h2>Patient Management</h2>
  <div>
    <button onclick="goHome()">🏠 Home</button>
    <button onclick="goBack()">← Back</button>
  </div>
</div>

<!-- Add / Edit Patient Modal -->
<div class="modal-overlay" id="formModal">
  <div class="modal-box">
    <h3 id="modalTitle">Add Patient</h3>
    <input type="hidden" id="editId">

    <label>Full Name *</label>
    <input id="fFullName" placeholder="Full Name">

    <label>Email *</label>
    <input id="fEmail" type="email" placeholder="Email">

    <label>Phone</label>
    <input id="fPhone" placeholder="Phone">

    <label>IC Number *</label>
    <input id="fIcNumber" placeholder="IC Number">

    <label>Date of Birth</label>
    <input id="fDob" type="date">

    <label>Gender</label>
    <select id="fGender">
      <option value="">-- Select --</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
      <option value="Other">Other</option>
    </select>

    <label id="pwdLabel">Password *</label>
    <input id="fPassword" type="password" placeholder="Password (min 6 chars)">
    <small id="pwdHint" style="color:#6b7280;">Leave blank to keep existing password when editing</small>

    <p id="formError" style="color:#dc2626;margin-top:8px;font-size:13px;"></p>
    <div class="modal-actions">
      <button class="primary" onclick="submitForm()">Save</button>
      <button onclick="closeFormModal()" style="background:#f3f4f6;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;">Cancel</button>
    </div>
  </div>
</div>

<!-- Visit History Modal -->
<div class="modal-overlay" id="historyModal">
  <div class="modal-box" style="max-width:820px;">
    <h3 id="historyTitle">Visit History</h3>
    <div id="historyContent"></div>
    <div class="modal-actions">
      <button onclick="closeHistoryModal()" style="background:#f3f4f6;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;">Close</button>
    </div>
  </div>
</div>

<div class="dashboard-container">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:10px;">
    <h2 style="margin:0;">Patients</h2>
    <button class="primary" style="width:auto;" onclick="openAddModal()">+ Add Patient</button>
  </div>

  <!-- Search / Filter -->
  <div class="filter-row">
    <input id="searchInput" placeholder="Search name, email, IC, phone…" style="min-width:240px;" oninput="debounceLoad()">
    <select id="genderFilter" onchange="loadPatients(1)">
      <option value="">All Genders</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
      <option value="Other">Other</option>
    </select>
    <input id="dobDate" type="date" title="Date of Birth" onchange="loadPatients(1)">
    <button class="primary" style="width:auto;" onclick="loadPatients(1)">Search</button>
    <button style="background:#f3f4f6;border:1px solid #d1d5db;padding:8px 14px;border-radius:6px;cursor:pointer;" onclick="clearFilters()">Clear</button>
  </div>

  <div id="patientTable">Loading…</div>

  <div class="pagination" id="pagination"></div>
</div>

<footer><p>© 2026 Smart Clinic System</p></footer>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const API = "http://localhost:5000/api/patients";
let currentPage = 1;
let debounceTimer = null;

function token() {
  return localStorage.getItem("adminToken") || "";
}

function authHeaders() {
  return { "Content-Type": "application/json", "Authorization": `Bearer ${token()}` };
}

function debounceLoad() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => loadPatients(1), 350);
}

function clearFilters() {
  document.getElementById("searchInput").value = "";
  document.getElementById("genderFilter").value = "";
  document.getElementById("dobDate").value = "";
  loadPatients(1);
}

async function loadPatients(page = 1) {
  currentPage = page;
  const search   = document.getElementById("searchInput").value.trim();
  const gender   = document.getElementById("genderFilter").value;
  const dobDate  = document.getElementById("dobDate").value;

  const params = new URLSearchParams({ page, limit: 15 });
  if (search)  params.set("search", search);
  if (gender)  params.set("gender", gender);
  if (dobDate) params.set("date_of_birth", dobDate);

  const tableEl = document.getElementById("patientTable");
  tableEl.innerHTML = "Loading…";

  try {
    const res = await fetch(`${API}?${params}`, { headers: authHeaders() });
    if (res.status === 401 || res.status === 403) {
      tableEl.innerHTML = "<p style='color:#dc2626;'>Session expired. Please log in again.</p>";
      return;
    }
    const data = await res.json();

    if (!data.patients || data.patients.length === 0) {
      tableEl.innerHTML = "<p>No patients found.</p>";
      document.getElementById("pagination").innerHTML = "";
      return;
    }

    let html = `
      <table class="patient-table">
        <thead>
          <tr>
            <th>ID</th><th>Name</th><th>Email</th><th>Phone</th>
            <th>IC Number</th><th>Age</th><th>Gender</th>
            <th>Today Doctor</th><th>Queue</th><th>Status</th>
            <th>Registered</th><th>Follow-up</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
    `;
    data.patients.forEach(p => {
      const genderBadge = p.gender
        ? `<span class="badge badge-${p.gender.toLowerCase()}">${p.gender}</span>`
        : "—";
      const age = p.age != null ? p.age : (p.date_of_birth ? calcAge(p.date_of_birth) : "—");
      const reg = p.created_at ? p.created_at.slice(0, 10) : "—";
      const todayDoctor = esc(p.today_doctor_name || "—");
      const todayQueue = p.today_queue_number != null ? p.today_queue_number : "—";
      const todayStatus = p.today_status || "—";
      const statusClass = p.today_status ? `status-${String(p.today_status).replace(" ", ".")}` : "";
      html += `
        <tr>
          <td>${p.id}</td>
          <td>${esc(p.full_name)}</td>
          <td>${esc(p.email)}</td>
          <td>${esc(p.phone || "—")}</td>
          <td>${esc(p.ic_number)}</td>
          <td>${age}</td>
          <td>${genderBadge}</td>
          <td>${todayDoctor}</td>
          <td>${todayQueue}</td>
          <td>${p.today_status ? `<span class="status-badge ${statusClass}">${todayStatus}</span>` : "—"}</td>
          <td>${reg}</td>
          <td style="text-align:center;">
            <label style="display:inline-flex; align-items:center; gap:8px;">
              <input type="checkbox" onchange="toggleFollowUp(${p.id}, this.checked)" ${p.needs_follow_up ? 'checked' : ''} />
            </label>
          </td>
          <td style="white-space:nowrap;">
            <button onclick="openEditModal(${p.id})" style="margin-right:4px;">✏️ Edit</button>
            <button onclick="viewHistory(${p.id})" style="margin-right:4px;">📋 History</button>
            <button class="btn-danger" onclick="deletePatient(${p.id}, '${esc(p.full_name)}')">🗑 Delete</button>
          </td>
        </tr>
      `;
    });
    html += "</tbody></table>";
    tableEl.innerHTML = html;

    renderPagination(data.total, data.page, data.limit);
  } catch (err) {
    tableEl.innerHTML = `<p style='color:#dc2626;'>Failed to load patients: ${err.message}</p>`;
  }
}

function calcAge(dob) {
  const diff = Date.now() - new Date(dob).getTime();
  return Math.floor(diff / (365.25 * 24 * 60 * 60 * 1000));
}

function esc(str) {
  return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderPagination(total, page, limit) {
  const totalPages = Math.ceil(total / limit);
  const el = document.getElementById("pagination");
  if (totalPages <= 1) { el.innerHTML = ""; return; }
  el.innerHTML = `
    <button onclick="loadPatients(${page - 1})" ${page <= 1 ? "disabled" : ""}>‹ Prev</button>
    <span>Page ${page} of ${totalPages} (${total} patients)</span>
    <button onclick="loadPatients(${page + 1})" ${page >= totalPages ? "disabled" : ""}>Next ›</button>
  `;
}

// ── Add / Edit modal ──────────────────────────────────────────
function openAddModal() {
  document.getElementById("editId").value = "";
  document.getElementById("modalTitle").textContent = "Add Patient";
  document.getElementById("fFullName").value = "";
  document.getElementById("fEmail").value = "";
  document.getElementById("fPhone").value = "";
  document.getElementById("fIcNumber").value = "";
  document.getElementById("fDob").value = "";
  document.getElementById("fGender").value = "";
  document.getElementById("fPassword").value = "";
  document.getElementById("pwdLabel").textContent = "Password *";
  document.getElementById("pwdHint").style.display = "none";
  document.getElementById("formError").textContent = "";
  document.getElementById("formModal").classList.add("open");
}

async function openEditModal(id) {
  try {
    const res = await fetch(`${API}/${id}`, { headers: authHeaders() });
    const p = await res.json();
    document.getElementById("editId").value = p.id;
    document.getElementById("modalTitle").textContent = "Edit Patient";
    document.getElementById("fFullName").value = p.full_name || "";
    document.getElementById("fEmail").value = p.email || "";
    document.getElementById("fPhone").value = p.phone || "";
    document.getElementById("fIcNumber").value = p.ic_number || "";
    document.getElementById("fDob").value = p.date_of_birth ? p.date_of_birth.slice(0,10) : "";
    document.getElementById("fGender").value = p.gender || "";
    document.getElementById("fPassword").value = "";
    document.getElementById("pwdLabel").textContent = "New Password";
    document.getElementById("pwdHint").style.display = "block";
    document.getElementById("formError").textContent = "";
    document.getElementById("formModal").classList.add("open");
  } catch (err) {
    alert("Failed to load patient: " + err.message);
  }
}

function closeFormModal() {
  document.getElementById("formModal").classList.remove("open");
}

async function submitForm() {
  const errEl = document.getElementById("formError");
  errEl.textContent = "";

  const id         = document.getElementById("editId").value;
  const fullName   = document.getElementById("fFullName").value.trim();
  const email      = document.getElementById("fEmail").value.trim().toLowerCase();
  const phone      = document.getElementById("fPhone").value.trim();
  const icNumber   = document.getElementById("fIcNumber").value.trim();
  const dateOfBirth = document.getElementById("fDob").value;
  const gender     = document.getElementById("fGender").value;
  const password   = document.getElementById("fPassword").value;

  if (!fullName || !email || !icNumber) {
    errEl.textContent = "Full name, email, and IC number are required.";
    return;
  }

  const isEdit = !!id;
  if (!isEdit && !password) {
    errEl.textContent = "Password is required for new patients.";
    return;
  }

  const body = { fullName, email, phone, icNumber, dateOfBirth, gender };
  if (!isEdit) body.password = password;

  const url    = isEdit ? `${API}/${id}` : `${API}/admin/create`;
  const method = isEdit ? "PUT" : "POST";

  try {
    const res = await fetch(url, {
      method,
      headers: authHeaders(),
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (res.ok) {
      closeFormModal();
      loadPatients(currentPage);
    } else {
      errEl.textContent = data.message || (data.errors ? data.errors.join(", ") : "Failed to save patient");
    }
  } catch (err) {
    errEl.textContent = "Network error: " + err.message;
  }
}

// ── Delete ───────────────────────────────────────────────────
async function deletePatient(id, name) {
  if (!confirm(`Delete patient "${name}"?\nThis will remove their login account too.`)) return;
  try {
    const res = await fetch(`${API}/${id}`, { method: "DELETE", headers: authHeaders() });
    const data = await res.json();
    if (res.ok) {
      loadPatients(currentPage);
    } else {
      alert(data.message || "Delete failed");
    }
  } catch (err) {
    alert("Network error: " + err.message);
  }
}

// Toggle follow-up flag for a patient (admin action)
async function toggleFollowUp(id, checked) {
  try {
    const res = await fetch(`${API}/${id}/followup`, {
      method: 'PUT',
      headers: authHeaders(),
      body: JSON.stringify({ follow_up: !!checked })
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      alert(data.message || 'Failed to update follow-up status');
      // revert checkbox state visually by reloading patients
      loadPatients(currentPage);
      return;
    }
    loadPatients(currentPage);
  } catch (err) {
    alert('Network error: ' + err.message);
    loadPatients(currentPage);
  }
}

// ── Visit History ────────────────────────────────────────────
async function viewHistory(id) {
  document.getElementById("historyContent").innerHTML = "Loading…";
  document.getElementById("historyModal").classList.add("open");

  try {
    const res = await fetch(`${API}/${id}/history`, { headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) {
      document.getElementById("historyContent").innerHTML = `<p style='color:#dc2626;'>${data.message}</p>`;
      return;
    }

    const p = data.patient;
    let html = `
      <div style="background:#f9fafb;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;">
        <strong>${esc(p.full_name)}</strong> &nbsp;|&nbsp; ${esc(p.email)}
        &nbsp;|&nbsp; IC: ${esc(p.ic_number)}
        ${p.age != null ? `&nbsp;|&nbsp; Age: ${p.age}` : ""}
        ${p.gender ? `&nbsp;|&nbsp; ${esc(p.gender)}` : ""}
      </div>
    `;

    document.getElementById("historyTitle").textContent = `Visit History — ${p.full_name}`;

    // Appointments
    html += `<div class="history-section"><h4>Appointments (${data.appointments.length})</h4>`;
    if (data.appointments.length === 0) {
      html += "<p style='color:#6b7280;font-size:13px;'>No appointments.</p>";
    } else {
      html += `
        <table class="history-table">
          <thead>
            <tr><th>Date</th><th>Time</th><th>Doctor</th><th>Specialization</th><th>Queue</th><th>Status</th></tr>
          </thead>
          <tbody>
      `;
      data.appointments.forEach(a => {
        const statusClass = `status-${a.status.replace(" ", ".")}`;
        html += `
          <tr>
            <td>${a.appointment_date}</td>
            <td>${a.appointment_time}</td>
            <td>${esc(a.doctor_name || "—")}</td>
            <td>${esc(a.specialization || "—")}</td>
            <td>${a.queue_number}</td>
            <td><span class="status-badge ${statusClass}">${a.status}</span></td>
          </tr>
        `;
      });
      html += "</tbody></table>";
    }
    html += "</div>";

    // Medical Records
    html += `<div class="history-section"><h4>Medical Records (${data.medicalRecords.length})</h4>`;
    if (data.medicalRecords.length === 0) {
      html += "<p style='color:#6b7280;font-size:13px;'>No medical records.</p>";
    } else {
      html += `
        <table class="history-table">
          <thead>
            <tr><th>Visit Date</th><th>Doctor</th><th>Diagnosis</th><th>Prescriptions</th><th>Notes</th></tr>
          </thead>
          <tbody>
      `;
      data.medicalRecords.forEach(r => {
        html += `
          <tr>
            <td>${r.visit_date || "—"}</td>
            <td>${esc(r.doctor_name || "—")}</td>
            <td>${esc(r.diagnosis || "—")}</td>
            <td>${esc(r.prescriptions || "—")}</td>
            <td>${esc(r.notes || "—")}</td>
          </tr>
        `;
      });
      html += "</tbody></table>";
    }
    html += "</div>";

    document.getElementById("historyContent").innerHTML = html;
  } catch (err) {
    document.getElementById("historyContent").innerHTML = `<p style='color:#dc2626;'>Error: ${err.message}</p>`;
  }
}

function closeHistoryModal() {
  document.getElementById("historyModal").classList.remove("open");
}

// Close modals on overlay click
document.getElementById("formModal").addEventListener("click", function(e) {
  if (e.target === this) closeFormModal();
});
document.getElementById("historyModal").addEventListener("click", function(e) {
  if (e.target === this) closeHistoryModal();
});

function goHome() { window.location.href = "admin-dashboard.html"; }
function goBack() { window.history.back(); }

// Redirect if not logged in
if (!localStorage.getItem("adminToken")) {
  window.location.href = "admin.html";
}

if (window.io) {
  const socket = window.io("http://localhost:5000");
  socket.on("queue:updated", () => loadPatients(currentPage));
  socket.on("patients:updated", () => loadPatients(currentPage));
}

loadPatients(1);
</script>
</body>
</html>
