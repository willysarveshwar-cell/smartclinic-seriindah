<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f766e">
  <title>Admin Portal | Smart Clinic</title>
  <link rel="stylesheet" href="modern-styles.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--primary-900) 0%, var(--primary-dark) 100%);
    }
    
    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-8);
      margin: 0;
      margin-top: var(--navbar-height);
    }
    
    .auth-card {
      background: var(--surface);
      padding: var(--spacing-8);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 420px;
    }
    
    .auth-card h2 {
      font-size: var(--text-2xl);
      margin-bottom: var(--spacing-2);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: var(--spacing-3);
    }
    
    .auth-card h2::before {
      content: "";
      display: block;
      width: 4px;
      height: 28px;
      background: var(--danger);
      border-radius: var(--radius-full);
    }
    
    .auth-subtitle {
      color: var(--text-secondary);
      font-size: var(--text-sm);
      margin-bottom: var(--spacing-6);
    }
  </style>
  <script src="api-config.js"></script>
</head>
<body class="layout-top-nav">

<header class="navbar" style="background: linear-gradient(135deg, var(--primary-900) 0%, var(--primary-dark) 100%); border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
  <div class="navbar-brand">Smart Clinic - Admin Portal</div>
  <nav class="navbar-nav">
    <button class="btn btn-text" onclick="window.location.href='index.html'"><i class="fas fa-home"></i> Home</button>
    <button class="btn btn-text" onclick="window.history.back()"><i class="fas fa-arrow-left"></i> Back</button>
  </nav>
</header>

<main class="main-content">
  <div class="auth-card">
    <h2><i class="fas fa-lock"></i> Admin Login</h2>
    <p class="auth-subtitle">Secure access to clinic administration dashboard</p>
    
    <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email"><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" placeholder="Enter admin email" required>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password"><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>
      
      <button type="submit" class="btn btn-primary btn-full" style="margin-top: var(--spacing-6);">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
    </form>
    
    <div id="message"></div>
  </div>
</main>

<footer>
  <p>&copy; 2026 Smart Clinic System. Administration Panel.</p>
</footer>

<script>
async function handleAdminLogin(event) {
  event.preventDefault();
  
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const messageEl = document.getElementById("message");

  try {
    const res = await fetch("http://localhost:5000/api/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      const msg = data.detail ? `${data.message}: ${data.detail}` : (data.message || 'Invalid credentials');
      showMessage(messageEl, msg, 'danger');
      return;
    }

    localStorage.setItem("adminToken", data.token || "");
    localStorage.setItem("adminLoggedIn", "true");
    
    showMessage(messageEl, 'Login successful! Redirecting...', 'success');
    setTimeout(() => window.location.href = "admin-dashboard.html", 1500);

  } catch (err) {
    showMessage(messageEl, 'Server connection error', 'danger');
  }
}

function showMessage(el, message, type) {
  el.innerHTML = `<div class="alert alert-${type}" style="margin-top: var(--spacing-4);"><div class="alert-content"><p style="margin: 0;">${message}</p></div></div>`;
}
</script>
</body>
</html>
